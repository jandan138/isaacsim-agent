{
  "experiment_name": "block_a_navigation_prompt_runtime_robustness",
  "description": "Block A robustness slice on slightly harder navigation-only tasks. The slice stays toy-only and reuses the existing prompt/runtime matrix while increasing route length and control-horizon cost.",
  "task_family": "navigation",
  "execution_mode": "sequential",
  "backend": "toy",
  "planner_backend": "mock_block_a",
  "summary_basename": "block_a_robustness_summary",
  "summary_title": "Block A Robustness Summary",
  "results_root": "results/block_a_navigation_prompt_runtime_robustness",
  "output_dir": "results/processed/block_a_navigation_prompt_runtime_robustness",
  "analysis_mode": "block_a_navigation_robustness",
  "reference_summary_path": "results/processed/block_a_navigation_prompt_runtime_expanded/block_a_summary.json",
  "defaults": {
    "backend": "toy",
    "robot_id": "agent_point_robot",
    "seed": 0,
    "success_radius_m": 0.2,
    "step_size_m": 0.5,
    "control_dt_sec": 0.5
  },
  "prompt_variants": [
    {
      "id": "P0",
      "label": "direct_next_action",
      "response_mode": "direct_action_json",
      "self_check_required": false,
      "repair_instruction_template": "Repair the previous direct action. Return one valid JSON action only. Validation error: {validation_error}",
      "instruction_template": "Prompt variant: P0. Task: navigation. Goal pose: ({goal_x:.2f}, {goal_y:.2f}, yaw={goal_yaw:.2f}). Output the next action directly as one JSON object and keep it minimal.",
      "notes": "Direct minimal prompt that emits one action JSON object."
    },
    {
      "id": "P1",
      "label": "structured_tool_json",
      "response_mode": "tool_json",
      "self_check_required": false,
      "repair_instruction_template": "Repair the previous tool call. Return one valid JSON object with tool_name and arguments only. Validation error: {validation_error}",
      "instruction_template": "Prompt variant: P1. Task: navigation. Start pose: ({start_x:.2f}, {start_y:.2f}, yaw={start_yaw:.2f}). Goal pose: ({goal_x:.2f}, {goal_y:.2f}, yaw={goal_yaw:.2f}). Choose one tool from the provided tools and emit typed JSON with tool_name and arguments.",
      "notes": "Structured tool-call prompt with typed JSON arguments."
    },
    {
      "id": "P2",
      "label": "structured_tool_json_with_self_check",
      "response_mode": "tool_json_with_self_check",
      "self_check_required": true,
      "repair_instruction_template": "Repair the previous tool call. Return one JSON object with tool_name, arguments, and a brief self_check. Validation error: {validation_error}",
      "instruction_template": "Prompt variant: P2. Task: navigation. Start pose: ({start_x:.2f}, {start_y:.2f}, yaw={start_yaw:.2f}). Goal pose: ({goal_x:.2f}, {goal_y:.2f}, yaw={goal_yaw:.2f}). Choose one tool from the provided tools, emit typed JSON arguments, and include one brief self_check field before execution.",
      "notes": "Structured tool prompt plus a short explicit self-check field."
    }
  ],
  "runtime_variants": [
    {
      "id": "R0",
      "label": "bare_no_validation_no_retry",
      "runtime_policy": "block_a_r0_bare",
      "validate_actions": false,
      "max_retries_per_step": 0,
      "max_invalid_actions": 1,
      "notes": "No validation and no retry."
    },
    {
      "id": "R1",
      "label": "validate_single_retry",
      "runtime_policy": "block_a_r1_validate_retry",
      "validate_actions": true,
      "max_retries_per_step": 1,
      "max_invalid_actions": 2,
      "notes": "Validation plus one retry on invalid action."
    }
  ],
  "tasks": [
    {
      "task_id": "robust_nav_far_forward",
      "scene_id": "robust_stage_a",
      "start_pose": {
        "x": 0.0,
        "y": 0.0,
        "yaw": 0.0
      },
      "goal_pose": {
        "x": 2.5,
        "y": 0.0,
        "yaw": 0.0
      },
      "max_steps": 10,
      "max_time_sec": 10.0,
      "notes": "Longer straight-line task than the easy forward reference."
    },
    {
      "task_id": "robust_nav_far_diagonal",
      "scene_id": "robust_stage_b",
      "start_pose": {
        "x": 0.0,
        "y": 0.0,
        "yaw": 0.0
      },
      "goal_pose": {
        "x": 2.0,
        "y": 1.5,
        "yaw": 0.0
      },
      "max_steps": 10,
      "max_time_sec": 10.0,
      "notes": "Longer diagonal task with a larger cumulative route length."
    },
    {
      "task_id": "robust_nav_cross_quadrant",
      "scene_id": "robust_stage_c",
      "start_pose": {
        "x": -1.0,
        "y": -0.5,
        "yaw": 0.0
      },
      "goal_pose": {
        "x": 1.5,
        "y": 1.0,
        "yaw": 0.0
      },
      "max_steps": 12,
      "max_time_sec": 12.0,
      "notes": "Offset start and cross-quadrant target increase control horizon and error exposure."
    },
    {
      "task_id": "robust_nav_reverse_cross",
      "scene_id": "robust_stage_d",
      "start_pose": {
        "x": 1.5,
        "y": -1.0,
        "yaw": 0.0
      },
      "goal_pose": {
        "x": -1.0,
        "y": 1.5,
        "yaw": 0.0
      },
      "max_steps": 14,
      "max_time_sec": 14.0,
      "notes": "Longest route in the slice with a reverse-direction diagonal across quadrants."
    }
  ]
}
